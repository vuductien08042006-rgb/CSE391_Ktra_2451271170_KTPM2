<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100 p-4">

<!-- TASK LIST -->
<div class="  bg-white rounded-4 shadow p-4" style="width: 100%; max-width: 620px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Task List</h2>
        <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#addTaskModal">
            + Add Task
        </button>
    </div>

    <!-- Task 1 -->
    <div class="bg-light rounded-3 p-3 mb-3 d-flex align-items-center gap-3">
        <div class="flex-grow-1">
            <div class="text-muted small">Task</div>
            <div class="fw-bold">Go to gym</div>
        </div>
        <div>
            <div class="text-muted small">Priority</div>
            <div class="fw-bold text-danger">High</div>
        </div>
        <span class="border rounded-2 px-3 py-1 small fw-semibold text-secondary">To Do</span>
        <div class="border border-primary rounded-circle" style="width:32px;height:32px;"></div>
        <button class="btn btn-sm btn-outline-secondary border-0">✏️</button>
        <button class="btn btn-sm btn-outline-danger border-0">🗑️</button>
    </div>

    <!-- Task 2 -->
    <div class="bg-light rounded-3 p-3 mb-3 d-flex align-items-center gap-3">
        <div class="flex-grow-1">
            <div class="text-muted small">Task</div>
            <div class="fw-bold">Read a book</div>
        </div>
        <div>
            <div class="text-muted small">Priority</div>
            <div class="fw-bold text-success">Low</div>
        </div>
        <span class="border rounded-2 px-3 py-1 small fw-semibold text-secondary">Done</span>
        <div class="border border-primary rounded-circle" style="width:32px;height:32px;"></div>
        <button class="btn btn-sm btn-outline-secondary border-0">✏️</button>
        <button class="btn btn-sm btn-outline-danger border-0">🗑️</button>
    </div>

    <!-- Task 3 -->
    <div class="bg-light rounded-3 p-3 mb-3 d-flex align-items-center gap-3">
        <div class="flex-grow-1">
            <div class="text-muted small">Task</div>
            <div class="fw-bold">Go to market</div>
        </div>
        <div>
            <div class="text-muted small">Priority</div>
            <div class="fw-bold text-warning">Medium</div>
        </div>
        <span class="border rounded-2 px-3 py-1 small fw-semibold text-secondary">In Progress</span>
        <div class="border border-primary rounded-circle" style="width:32px;height:32px;"></div>
        <button class="btn btn-sm btn-outline-secondary border-0">✏️</button>
        <button class="btn btn-sm btn-outline-danger border-0">🗑️</button>
    </div>
</div>

<!-- MODAL ADD TASK -->
<div class="modal fade" id="addTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Add Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Task</label>
                    <input type="text" class="form-control" placeholder="Type your task here ...">
                </div>
                <div>
                    <label class="form-label fw-bold">Priority</label>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-danger fw-bold">High</button>
                        <button class="btn btn-outline-warning fw-bold">Medium</button>
                        <button class="btn btn-success fw-bold">Low</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-dark fw-bold px-4">Add</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
