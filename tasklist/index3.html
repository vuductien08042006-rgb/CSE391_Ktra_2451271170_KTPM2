<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Task List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background: #f3f3f3;
        }

        .task-container {
            width: 80%;
            margin: auto;
            margin-top: 30px;

            border: 1px solid #6c63ff;
            background: #ececf1;
            padding: 25px;
        }

        .btn-add {
            background: #7c4dff;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: bold;
        }

        .btn-add:hover {
            background: #6a3ff0;
            color: white;
        }

        .task-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .task-card small {
            color: gray;
        }

        .icon-edit {
            font-size: 22px;
            cursor: pointer;
            margin-right: 15px;
        }

        .icon-delete {
            font-size: 22px;
            color: #dc3545;
            cursor: pointer;
        }

        .priority-high {
            color: red;
            font-weight: bold;
        }

        .priority-low {
            color: green;
            font-weight: bold;
        }

        .priority-medium {
            color: orange;
            font-weight: bold;
        }

        .modal-content {
            border: 1px solid #6c63ff;
        }

        .btn-save {
            background: #6c757d;
            color: white;
            width: 100px;
        }
    </style>

</head>

<body>

    <div class="task-container">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1 class="fw-bold">
                Task List
            </h1>

            <button class="btn btn-add" data-bs-toggle="modal" data-bs-target="#taskModal">

                <i class="fa-solid fa-plus"></i>
                Add Task

            </button>

        </div>

        <!-- TASK 1 -->

        <div class="task-card">

            <div>
                <small>Task</small>
                <h5>Go to gym</h5>
            </div>

            <div>
                <small>Priority</small>
                <div class="priority-high">
                    High
                </div>
            </div>

            <div>
                <span class="badge text-bg-light">
                    To Do
                </span>
            </div>

            <div>
                <input type="radio">
            </div>

            <div>
                <i class="fa-regular fa-pen-to-square icon-edit"></i>

                <i class="fa-regular fa-trash-can icon-delete"></i>
            </div>

        </div>

        <!-- TASK 2 -->

        <div class="task-card">

            <div>
                <small>Task</small>
                <h5>Read a book</h5>
            </div>

            <div>
                <small>Priority</small>
                <div class="priority-low">
                    Low
                </div>
            </div>

            <div>
                <span class="badge text-bg-light">
                    Done
                </span>
            </div>

            <div>
                <input type="radio" checked>
            </div>

            <div>
                <i class="fa-regular fa-pen-to-square icon-edit"></i>

                <i class="fa-regular fa-trash-can icon-delete"></i>
            </div>

        </div>

        <!-- TASK 3 -->

        <div class="task-card">

            <div>
                <small>Task</small>
                <h5>Go to market</h5>
            </div>

            <div>
                <small>Priority</small>
                <div class="priority-medium">
                    Medium
                </div>
            </div>

            <div>
                <span class="badge text-bg-light">
                    In Progress
                </span>
            </div>

            <div>
                <input type="radio">
            </div>

            <div>
                <i class="fa-regular fa-pen-to-square icon-edit"></i>

                <i class="fa-regular fa-trash-can icon-delete"></i>
            </div>

        </div>

    </div>

    <!-- MODAL -->

    <div class="modal fade" id="taskModal">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <div class="modal-header">

                    <h3 class="fw-bold">
                        Add Task
                    </h3>

                    <button class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <label class="form-label fw-bold">
                        Task
                    </label>

                    <input type="text" class="form-control" placeholder="Type your task here...">

                    <div class="mt-4">

                        <label class="form-label fw-bold">
                            Priority
                        </label>

                        <div>

                            <button type="button" class="btn btn-outline-danger me-2">
                                High
                            </button>

                            <button type="button" class="btn btn-outline-warning me-2">
                                Medium
                            </button>

                            <button type="button" class="btn btn-success">
                                Low
                            </button>

                        </div>

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-save">
                        Add
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
